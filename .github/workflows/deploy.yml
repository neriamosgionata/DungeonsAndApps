name: CI/CD

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  # ── Detect what changed ────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed files
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --quiet
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)
          else
            git fetch --tags --quiet
            PREV_TAG=$(git tag --sort=-creatordate --merged HEAD | head -2 | tail -1)
            CUR_TAG=$(git tag --sort=-creatordate --merged HEAD | head -1)
            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CUR_TAG" ]; then
              CHANGED=$(git diff --name-only "$PREV_TAG" HEAD)
            else
              CHANGED="backend/src/main.rs web/src/app.css"
            fi
          fi
          BACKEND=false
          FRONTEND=false
          for f in $CHANGED; do
            case "$f" in
              backend/*|shared/*|Cargo.lock|Dockerfile.prod|.github/workflows/*) BACKEND=true ;;
              web/*|.github/workflows/*) FRONTEND=true ;;
            esac
          done
          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
          echo "::notice::Changed: backend=$BACKEND frontend=$FRONTEND ($(echo "$CHANGED" | wc -l) files)"

  # ── Backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: cinghiale
          POSTGRES_PASSWORD: cinghiale
          POSTGRES_DB: dungeonsandapps
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinghiale"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: rust-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        working-directory: backend
        env:
          DATABASE_URL: postgres://cinghiale:cinghiale@localhost:5432/dungeonsandapps
          JWT_SECRET: test-secret-at-least-32-bytes-long
          BIND_ADDR: 0.0.0.0:8080
          CORS_ORIGIN: http://localhost:5173
        run: cargo test

  # ── Frontend tests ─────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: svelte-check + tests
        working-directory: web
        run: |
          bunx svelte-check
          bun run test

  # ── Build ARM binary ───────────────────────────────────────────────────────
  build-backend:
    name: Cross-compile backend (aarch64)
    runs-on: ubuntu-latest
    needs: changes
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: rust-aarch64-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: rust-aarch64-${{ runner.os }}-

      - name: Cache cargo-zigbuild
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-${{ runner.os }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4

      - name: Install Rust + aarch64-musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install zig + cargo-zigbuild
        run: |
          pip install ziglang
          if [ ! -f ~/.cargo/bin/cargo-zigbuild ]; then
            cargo install cargo-zigbuild
          fi

      - name: Cross-compile (aarch64-musl static)
        working-directory: backend
        env:
          SQLX_OFFLINE: "true"
        run: cargo zigbuild --release --target aarch64-unknown-linux-musl

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-aarch64
          path: backend/target/aarch64-unknown-linux-musl/release/dungeonsandapps
          retention-days: 7

  # ── Build frontend ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build SvelteKit static
    runs-on: ubuntu-latest
    needs: changes
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: web
        env:
          PUBLIC_API_BASE: https://${{ secrets.DEPLOY_DOMAIN }}
        run: bun run build

      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: web/build/
          retention-days: 7

  # ── Build & push Docker image ──────────────────────────────────────────────
  docker-push:
    name: Push Docker image to GHCR
    runs-on: ubuntu-latest
    needs: [changes, build-backend]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: backend-aarch64
          path: backend/target/aarch64-unknown-linux-musl/release/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to EC2 ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [changes, docker-push, build-frontend]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      !cancelled() &&
      needs.changes.result == 'success' &&
      needs.docker-push.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    environment: production
    permissions:
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Download static build
        if: needs.build-frontend.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: web-static
          path: web-static/

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync static files to EC2
        if: needs.build-frontend.result == 'success'
        run: |
          rsync -az --delete web-static/ ec2-user@${{ secrets.EC2_HOST }}:/opt/dungeonsandapps/web/

      - name: Sync docker-compose + nginx config
        run: |
          rsync -az docker-compose.prod.yml nginx/nginx.prod.conf \
            ec2-user@${{ secrets.EC2_HOST }}:/opt/dungeonsandapps/

      - name: Deploy
        env:
          DEPLOY_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          AWS_REGION: eu-south-1
          SKIP_BACKEND: ${{ needs.changes.outputs.backend != 'true' }}
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh "${{ secrets.EC2_HOST }}" "${{ steps.tag.outputs.tag }}"
