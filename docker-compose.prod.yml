services:
  postgres:
    image: postgres:17-alpine
    container_name: dungeonsandapps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinghiale
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dungeonsandapps
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=50
      -c effective_cache_size=512MB
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinghiale -d dungeonsandapps"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    mem_limit: 256m
    cpus: 1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:-latest}
    container_name: dungeonsandapps-backend
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "8080"
    mem_limit: 256m
    cpus: 1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: dungeonsandapps-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/dungeonsandapps/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/dungeonsandapps/web:/var/www/dungeonsandapps:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - internal
    mem_limit: 64m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local

networks:
  internal:
    driver: bridge
